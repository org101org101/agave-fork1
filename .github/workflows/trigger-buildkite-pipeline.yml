name: Trigger Buildkite Pipeline (Pull Request)

on:
  pull_request_target:
    branches:
      - master
      - v[0-9]+.[0-9]+
    types:
      - opened
      - synchronize
      - reopened
      - labeled

jobs:
  trigger-buildkite-pipeline:
    runs-on: ubuntu-24.04
    steps:
      - name: Check trigger eligibility
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const action = context.payload.action;
            const pr = context.payload.pull_request;
            const prAuthorAssociation = pr.author_association;
            const prAuthor = pr.user.login;
            const insideAssociations = ['OWNER', 'MEMBER', 'COLLABORATOR'];
            const isOutsideContributor = !insideAssociations.includes(prAuthorAssociation);

            let shouldTrigger = false;
            let triggerType = '';
            let labelName = '';

            if (action === 'labeled') {
              labelName = context.payload.label.name;
              const isCiLabel = labelName === 'CI';

              console.log(`Label added: ${labelName}`);
              console.log(`Is CI label: ${isCiLabel}`);

              shouldTrigger = isCiLabel;
              triggerType = 'CI Label';

              if (isCiLabel) {
                console.log('Removing CI label...');
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: 'CI'
                });
                console.log('CI label removed');
              }
            } else {
              console.log(`PR Author: ${prAuthor}`);
              console.log(`PR Author Association: ${prAuthorAssociation}`);
              console.log(`Is outside contributor: ${isOutsideContributor}`);

              shouldTrigger = !isOutsideContributor;
              triggerType = 'Pull Request Event';
            }

            core.setOutput('should_trigger', shouldTrigger.toString());
            core.setOutput('trigger_type', triggerType);
            core.setOutput('label_name', labelName);
            core.setOutput('pr_author', prAuthor);
            core.setOutput('pr_author_association', prAuthorAssociation);
            core.setOutput('is_outside_contributor', isOutsideContributor.toString());

      - name: Prepare Buildkite pipeline info
        id: prepare
        if: steps.check.outputs.should_trigger == 'true'
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          COMMIT="${{ github.event.pull_request.head.sha }}"
          COMMIT_SHORT="${COMMIT:0:8}"
          TITLE="${{ github.event.pull_request.title }}"

          BRANCH="pull/${PR_NUMBER}/head"
          MESSAGE="PR#${PR_NUMBER} - ${COMMIT_SHORT} - ${TITLE}"

          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "message=${MESSAGE}" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT

      - name: Generate pipeline summary
        if: always()
        run: |
          if [ "${{ steps.check.outputs.should_trigger }}" == "true" ]; then
            SUMMARY_TITLE="Buildkite Pipeline Info"
            if [ "${{ github.event.action }}" == "labeled" ]; then
              TRIGGER_TYPE="🏷️ ${{ steps.check.outputs.trigger_type }}"
              EXTRA_INFO="| **Label** | \`${{ steps.check.outputs.label_name }}\` |"
            else
              TRIGGER_TYPE="📝 ${{ steps.check.outputs.trigger_type }}"
              EXTRA_INFO="| **PR Author** | ${{ steps.check.outputs.pr_author }} |
          | **Author Association** | \`${{ steps.check.outputs.pr_author_association }}\` |"
            fi

            cat >> $GITHUB_STEP_SUMMARY <<EOF
          # ${SUMMARY_TITLE}

          **Trigger:** $TRIGGER_TYPE

          | Field | Value |
          |-------|-------|
          $EXTRA_INFO
          | **PR Number** | #${{ steps.prepare.outputs.pr_number }} |
          | **Branch** | \`${{ steps.prepare.outputs.branch }}\` |
          | **Commit** | \`${{ steps.prepare.outputs.commit }}\` |
          | **Message** | ${{ steps.prepare.outputs.message }} |

          ---

          **Triggered at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          EOF
          else
            cat >> $GITHUB_STEP_SUMMARY <<EOF
          # Buildkite Pipeline Skipped

          | Field | Value |
          |-------|-------|
          | **Action** | \`${{ github.event.action }}\` |
          | **PR Author** | ${{ steps.check.outputs.pr_author }} |
          | **Author Association** | \`${{ steps.check.outputs.pr_author_association }}\` |
          | **Outside Contributor** | \`${{ steps.check.outputs.is_outside_contributor }}\` |

          **Reason:** This event does not meet the criteria to trigger Buildkite.

          **Evaluated at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          EOF
          fi

      - name: Trigger a Buildkite Build
        if: steps.check.outputs.should_trigger == 'true'
        uses: "buildkite/trigger-pipeline-action@909fed762c73d5ae2b5d555ab910d66b3fae2670" # v2.4.1
        with:
          pipeline: ${{ vars.BUILDKITE_PIPELINE }}
          buildkite_api_access_token: ${{ secrets.BUILDKITE_API_ACCESS_TOKEN }}
          branch: "${{ steps.prepare.outputs.branch }}"
          build_meta_data: '{"pr_number": "${{ steps.prepare.outputs.pr_number }}"}'
          commit: "${{ steps.prepare.outputs.commit }}"
          message: "${{ steps.prepare.outputs.message }}"
