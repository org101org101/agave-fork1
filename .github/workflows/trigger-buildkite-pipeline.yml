name: Trigger Buildkite Pipeline (Pull Request)

on:
  pull_request_target:
    types:
      - labeled

jobs:
  # Commented out for now, will update later
  # trigger-buildkite-pipeline:
  #   if: github.repository == 'anza-xyz/agave-fork1'
  #   runs-on: ubuntu-24.04
  #   steps:
  #     - name: Trigger a Buildkite Build
  #       uses: "buildkite/trigger-pipeline-action@909fed762c73d5ae2b5d555ab910d66b3fae2670"  # v2.4.1
  #       with:
  #         buildkite_api_access_token: ${{ secrets.BUILDKITE_API_ACCESS_TOKEN }}
  #         pipeline_uuid: "019e154e-0414-4b64-bcf0-f37a8c207ad0"
  #         branch: "${{ github.ref_name }}"
  #         build_env_vars: '{"TRIGGERED_BUILDKITE_TAG": "${{ github.ref_name }}"}'
  #         commit: "HEAD"
  #         message: ":github: Triggered from a GitHub Action"
  prepare-buildkite-info:
    # if: github.repository == 'anza-xyz/agave'
    if: github.event.label.name == 'CI'
    runs-on: ubuntu-24.04
    outputs:
      branch: ${{ steps.prepare.outputs.branch }}
      message: ${{ steps.prepare.outputs.message }}
      commit: ${{ steps.prepare.outputs.commit }}
      pr_number: ${{ steps.prepare.outputs.pr_number }}
    steps:
      - name: Remove CI label
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'CI'
            });

      - name: Approve latest pending workflow for this PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const headSha = context.payload.pull_request.head.sha;

            console.log(`Looking for pending workflows for PR #${prNumber} at commit ${headSha}`);

            // Fetch only recent workflow runs with pagination limit
            const { data: workflowRuns } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event: 'pull_request',
              status: 'action_required',
              per_page: 20, // Limit to 20 most recent to avoid rate limits
            });

            // Filter by PR's head SHA for exact match
            const matchingRuns = workflowRuns.workflow_runs.filter(run =>
              run.head_sha === headSha
            );

            if (matchingRuns.length === 0) {
              console.log('No pending workflows found for this PR commit');
              return;
            }

            // Sort by created_at descending and get the latest one
            const latestRun = matchingRuns.sort((a, b) =>
              new Date(b.created_at) - new Date(a.created_at)
            )[0];

            console.log(`Approving latest workflow run ${latestRun.id} (${latestRun.name}) for PR #${prNumber}`);

            try {
              await github.rest.actions.approveWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: latestRun.id,
              });
              console.log(`Successfully approved workflow run ${latestRun.id}`);
            } catch (error) {
              console.log(`Failed to approve workflow run ${latestRun.id}: ${error.message}`);
            }

      - name: Prepare Buildkite pipeline info
        id: prepare
        run: |
          # Port of triggerPipeline logic - extract branch and message
          PR_NUMBER="${{ github.event.pull_request.number }}"
          COMMIT="${{ github.event.pull_request.head.sha }}"
          COMMIT_SHORT="${COMMIT:0:8}"
          TITLE="${{ github.event.pull_request.title }}"

          BRANCH="pull/${PR_NUMBER}/head"
          MESSAGE="PR#${PR_NUMBER} - ${COMMIT_SHORT} - ${TITLE}"

          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "message=${MESSAGE}" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT

  debug-buildkite-info:
    needs: prepare-buildkite-info
    runs-on: ubuntu-24.04
    steps:
      - name: Debug pipeline info
        run: |
          echo "PR Number: ${{ needs.prepare-buildkite-info.outputs.pr_number }}"
          echo "Branch: ${{ needs.prepare-buildkite-info.outputs.branch }}"
          echo "Message: ${{ needs.prepare-buildkite-info.outputs.message }}"
          echo "PR Commit: ${{ needs.prepare-buildkite-info.outputs.commit }}"
