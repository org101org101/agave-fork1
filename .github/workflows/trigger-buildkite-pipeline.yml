name: Trigger Buildkite Pipeline (Pull Request)

on:
  pull_request_target:
    branches:
      - master
      - v[0-9]+.[0-9]+
    types:
      - opened
      - synchronize
      - reopened
      - labeled

jobs:
  check:
    runs-on: ubuntu-24.04
    if: >-
      (github.event.action == 'labeled' && github.event.label.name == 'CI') ||
      (github.event.action != 'labeled' && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association))
    steps:
      - name: Check member or CI label
        id: check
        if: >-
          (github.event.action == 'labeled' && github.event.label.name == 'CI') ||
          (github.event.action != 'labeled' && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association))
        env:
          ACTION: ${{ github.event.action }}
          LABEL_NAME: ${{ github.event.label.name }}
        run: |
          if [ "$ACTION" = "labeled" ]; then
            TRIGGER_TYPE="CI Label"
          else
            TRIGGER_TYPE="Pull Request Event"
          fi

          {
            printf 'label_name=%s\n' "$LABEL_NAME"
            printf 'should_trigger=true\n'
            printf 'trigger_type=%s\n' "$TRIGGER_TYPE"
          } >> "$GITHUB_OUTPUT"
   
  main:
    runs-on: ubuntu-24.04
    steps:
      - name: Print debug event info
        if: runner.debug == '1'
        env:
          ACTION: ${{ github.event.action }}
          LABEL_NAME: ${{ github.event.label.name }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
        run: |
          echo "Buildkite trigger event debug"
          echo "Action: ${ACTION}"

          if [ "$ACTION" = "labeled" ]; then
            echo "Label: ${LABEL_NAME}"
          else
            echo "PR Author: ${PR_AUTHOR}"
            echo "Author Association: ${PR_AUTHOR_ASSOCIATION}"
          fi

      - name: Remove CI label
        if: github.event.action == 'labeled' && steps.check.outputs.should_trigger == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'CI',
              });
            } catch (error) {
              if (error.status === 404) {
                core.warning('CI label was already removed.');
              } else {
                throw error;
              }
            }

      - name: Prepare Buildkite pipeline info
        id: prepare
        if: steps.check.outputs.should_trigger == 'true'
        env:
          BUILDKITE_PIPELINE: ${{ vars.BUILDKITE_PIPELINE }}
          COMMIT: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          COMMIT_SHORT="${COMMIT:0:8}"
          BRANCH="pull/${PR_NUMBER}/head"
          MESSAGE="PR#${PR_NUMBER} - ${COMMIT_SHORT} - ${TITLE}"

          {
            printf 'branch=%s\n' "$BRANCH"
            printf 'build_meta_data={"pr_number":"%s"}\n' "$PR_NUMBER"
            printf 'commit=%s\n' "$COMMIT"
            printf 'message=%s\n' "$MESSAGE"
            printf 'pipeline=%s\n' "$BUILDKITE_PIPELINE"
            printf 'pr_number=%s\n' "$PR_NUMBER"
          } >> "$GITHUB_OUTPUT"

      - name: Print debug pipeline info
        if: runner.debug == '1' && steps.check.outputs.should_trigger == 'true'
        env:
          BRANCH: ${{ steps.prepare.outputs.branch }}
          BUILD_META_DATA: ${{ steps.prepare.outputs.build_meta_data }}
          COMMIT: ${{ steps.prepare.outputs.commit }}
          MESSAGE: ${{ steps.prepare.outputs.message }}
          PIPELINE: ${{ steps.prepare.outputs.pipeline }}
          PR_NUMBER: ${{ steps.prepare.outputs.pr_number }}
          TRIGGER_TYPE: ${{ steps.check.outputs.trigger_type }}
        run: |
          echo "Buildkite pipeline debug"
          echo "Trigger Type: ${TRIGGER_TYPE}"
          echo "Pipeline: ${PIPELINE}"
          echo "PR Number: #${PR_NUMBER}"
          echo "Branch: ${BRANCH}"
          echo "Commit: ${COMMIT}"
          echo "Message: ${MESSAGE}"
          echo "Build Metadata: ${BUILD_META_DATA}"

      - name: Trigger a Buildkite Build
        if: steps.check.outputs.should_trigger == 'true'
        uses: "buildkite/trigger-pipeline-action@909fed762c73d5ae2b5d555ab910d66b3fae2670" # v2.4.1
        with:
          pipeline: ${{ steps.prepare.outputs.pipeline }}
          buildkite_api_access_token: ${{ secrets.BUILDKITE_API_ACCESS_TOKEN }}
          branch: "${{ steps.prepare.outputs.branch }}"
          build_meta_data: "${{ steps.prepare.outputs.build_meta_data }}"
          commit: "${{ steps.prepare.outputs.commit }}"
          message: "${{ steps.prepare.outputs.message }}"
