name: Trigger Buildkite Pipeline (Pull Request)

on:
  pull_request_target:
    branches:
      - master
      - v[0-9]+.[0-9]+
    types:
      - opened
      - synchronize
      - reopened
      - labeled

jobs:
  check-label:
    # Only run on labeled events
    if: github.event.action == 'labeled'
    runs-on: ubuntu-24.04
    outputs:
      is_ci_label: ${{ steps.check.outputs.is_ci_label }}
      label_name: ${{ steps.check.outputs.label_name }}
    steps:
      - name: Check and remove CI label
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const labelName = context.payload.label.name;
            const isCiLabel = labelName === 'CI';

            console.log(`Label added: ${labelName}`);
            console.log(`Is CI label: ${isCiLabel}`);

            core.setOutput('is_ci_label', isCiLabel.toString());
            core.setOutput('label_name', labelName);

            // Remove CI label if it matches
            if (isCiLabel) {
              console.log('Removing CI label...');
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'CI'
              });
              console.log('CI label removed');
            }

  check-member:
    # Only check membership for non-labeled events
    if: github.event.action != 'labeled'
    runs-on: ubuntu-24.04
    outputs:
      is_outside_contributor: ${{ steps.check.outputs.is_outside_contributor }}
      pr_author: ${{ steps.check.outputs.pr_author }}
      pr_author_association: ${{ steps.check.outputs.pr_author_association }}
    steps:
      - name: Check if member
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const prAuthorAssociation = context.payload.pull_request.author_association;
            const prAuthor = context.payload.pull_request.user.login;
            const insideAssociations = ['OWNER', 'MEMBER', 'COLLABORATOR'];
            const isOutsideContributor = !insideAssociations.includes(prAuthorAssociation);

            console.log(`PR Author: ${prAuthor}`);
            console.log(`PR Author Association: ${prAuthorAssociation}`);
            console.log(`Is outside contributor: ${isOutsideContributor}`);

            core.setOutput('is_outside_contributor', isOutsideContributor.toString());
            core.setOutput('pr_author', prAuthor);
            core.setOutput('pr_author_association', prAuthorAssociation);

  prepare-buildkite-info:
    needs:
      - check-label
      - check-member
    if: |
      always() &&
      (
        (needs.check-label.result == 'success' && needs.check-label.outputs.is_ci_label == 'true') ||
        (needs.check-member.result == 'success' && needs.check-member.outputs.is_outside_contributor == 'false')
      )
    runs-on: ubuntu-24.04
    outputs:
      branch: ${{ steps.prepare.outputs.branch }}
      message: ${{ steps.prepare.outputs.message }}
      commit: ${{ steps.prepare.outputs.commit }}
      pr_number: ${{ steps.prepare.outputs.pr_number }}
    steps:

      - name: Prepare Buildkite pipeline info
        id: prepare
        run: |
          # Port of triggerPipeline logic - extract branch and message
          PR_NUMBER="${{ github.event.pull_request.number }}"
          COMMIT="${{ github.event.pull_request.head.sha }}"
          COMMIT_SHORT="${COMMIT:0:8}"
          TITLE="${{ github.event.pull_request.title }}"

          BRANCH="pull/${PR_NUMBER}/head"
          MESSAGE="PR#${PR_NUMBER} - ${COMMIT_SHORT} - ${TITLE}"

          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "message=${MESSAGE}" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT

      - name: Generate pipeline summary
        run: |
          # Check if this was triggered by CI label
          if [ "${{ github.event.action }}" == "labeled" ]; then
            TRIGGER_TYPE="🏷️ CI Label"
            AUTHOR_INFO=""
          else
            TRIGGER_TYPE="📝 Pull Request Event"
            AUTHOR_INFO="| **PR Author** | ${{ needs.check-member.outputs.pr_author }} |
          | **Author Association** | \`${{ needs.check-member.outputs.pr_author_association }}\` |"
          fi

          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # Buildkite Pipeline Info

          **Trigger:** $TRIGGER_TYPE

          | Field | Value |
          |-------|-------|
          $AUTHOR_INFO
          | **PR Number** | #${{ steps.prepare.outputs.pr_number }} |
          | **Branch** | \`${{ steps.prepare.outputs.branch }}\` |
          | **Commit** | \`${{ steps.prepare.outputs.commit }}\` |
          | **Message** | ${{ steps.prepare.outputs.message }} |

          ---

          **Triggered at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          EOF

  trigger-buildkite-pipeline:
    needs: prepare-buildkite-info
    runs-on: ubuntu-24.04
    steps:
      - name: Trigger a Buildkite Build
        uses: "buildkite/trigger-pipeline-action@909fed762c73d5ae2b5d555ab910d66b3fae2670" # v2.4.1
        with:
          pipeline: ${{ vars.BUILDKITE_PIPELINE }}
          buildkite_api_access_token: ${{ secrets.BUILDKITE_API_ACCESS_TOKEN }}
          branch: "${{ needs.prepare-buildkite-info.outputs.branch }}"
          build_meta_data: '{"pr_number": "${{ needs.prepare-buildkite-info.outputs.pr_number }}"}'
          commit: "${{ needs.prepare-buildkite-info.outputs.commit }}"
          message: "${{ needs.prepare-buildkite-info.outputs.message }}"
